name: Release SteamPipe

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Semver tag to release (example: v1.0.0)"
        required: true
        type: string
      dry_run:
        description: "Skip upload and run checks only"
        required: true
        default: true
        type: boolean
      rc_blocker_override:
        description: "Emergency-only override for open RC blocker issues"
        required: false
        default: false
        type: boolean
      rc_blocker_override_reason:
        description: "Required when rc_blocker_override=true (approval ticket + approver + reason)"
        required: false
        default: ""
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: read
  actions: read
  issues: read
  attestations: write
  id-token: write

env:
  EXPECTED_UNITY_VERSION: 6000.3.9f1
  RC_BLOCKER_LABEL: P0-blocker
  RC_SCOPE_LABEL: scope:1.0
  RC_BLOCKER_MILESTONE: M9.1 - 1.0 Launch Remediation

concurrency:
  group: release-steampipe-${{ github.ref }}
  cancel-in-progress: false

jobs:
  preflight:
    name: Release preflight
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.tag.outputs.release_tag }}
      dry_run: ${{ steps.mode.outputs.dry_run }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - id: tag
        name: Resolve and validate release tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG="${{ github.event.inputs.release_tag }}"
          fi

          if [[ -z "$TAG" || ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-.].*)?$ ]]; then
            echo "::error::release_tag must be semver and start with v (example: v1.0.0)."
            exit 1
          fi

          echo "release_tag=$TAG" >> "$GITHUB_OUTPUT"

      - id: mode
        name: Resolve run mode
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "dry_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "dry_run=${{ github.event.inputs.dry_run }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Guard protected context for tag pushes
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref_protected }}" != "true" ]; then
            echo "::error::Release tag pushes must originate from protected refs."
            exit 1
          fi

      - id: rc_blocker_gate
        name: Enforce RC blocker issue gate
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          RC_BLOCKER_OVERRIDE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.rc_blocker_override || 'false' }}
          RC_BLOCKER_OVERRIDE_REASON: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.rc_blocker_override_reason || '' }}
          RC_BLOCKER_SUMMARY_JSON: Artifacts/RCValidation/rc_blocker_gate_summary.json
          RC_BLOCKER_SUMMARY_MD: Artifacts/RCValidation/rc_blocker_gate_summary.md
        run: |
          chmod +x scripts/ci/rc-blocker-gate-check.sh
          scripts/ci/rc-blocker-gate-check.sh

      - name: Publish RC blocker summary
        if: always()
        shell: bash
        run: |
          if [ -f "Artifacts/RCValidation/rc_blocker_gate_summary.md" ]; then
            cat "Artifacts/RCValidation/rc_blocker_gate_summary.md" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload RC blocker summary artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rc-blocker-gate-${{ steps.tag.outputs.release_tag }}-${{ github.sha }}
          path: |
            Artifacts/RCValidation/rc_blocker_gate_summary.json
            Artifacts/RCValidation/rc_blocker_gate_summary.md
          if-no-files-found: warn

  secret_scan:
    name: Secret scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: "false"

  rc_validation_bundle:
    name: RC validation bundle gate
    needs:
      - preflight
      - secret_scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - name: Collect RC workflow evidence for release SHA
        id: bundle
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          HEAD_SHA: ${{ github.sha }}
          RELEASE_TAG: ${{ needs.preflight.outputs.release_tag }}
        run: |
          set -euo pipefail

          mkdir -p Artifacts/RCValidation
          generated_utc="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          summary_md="Artifacts/RCValidation/rc_validation_bundle.md"
          summary_json="Artifacts/RCValidation/rc_validation_bundle.json"
          requirements_tmp="Artifacts/RCValidation/requirements.tmp.json"
          echo "[]" > "$requirements_tmp"

          bundle_pass=true
          required_workflows=(
            "ci-build.yml"
            "ci-tests.yml"
            "ci-content-validator.yml"
            "ci-scene-capture.yml"
            "nightly-full-regression.yml"
          )

          for workflow in "${required_workflows[@]}"; do
            api_url="https://api.github.com/repos/${REPO}/actions/workflows/${workflow}/runs?head_sha=${HEAD_SHA}&status=completed&per_page=50"
            response="$(curl -fsSL \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "${api_url}")"

            run="$(echo "${response}" | jq --arg head_sha "${HEAD_SHA}" '[.workflow_runs[] | select(.head_sha == $head_sha)] | sort_by(.run_started_at) | last')"

            if [ "${run}" = "null" ]; then
              conclusion="missing"
              run_url=""
              run_number=""
              run_started_at=""
              run_name="${workflow}"
              bundle_pass=false
            else
              conclusion="$(echo "${run}" | jq -r '.conclusion // "unknown"')"
              run_url="$(echo "${run}" | jq -r '.html_url // ""')"
              run_number="$(echo "${run}" | jq -r '.run_number // ""')"
              run_started_at="$(echo "${run}" | jq -r '.run_started_at // ""')"
              run_name="$(echo "${run}" | jq -r --arg workflow "${workflow}" '.name // $workflow')"
              if [ "${conclusion}" != "success" ]; then
                bundle_pass=false
              fi
            fi

            next_tmp="${requirements_tmp}.next"
            jq \
              --arg workflow "${workflow}" \
              --arg run_name "${run_name}" \
              --arg conclusion "${conclusion}" \
              --arg run_url "${run_url}" \
              --arg run_number "${run_number}" \
              --arg run_started_at "${run_started_at}" \
              '. + [{"workflow":$workflow,"run_name":$run_name,"conclusion":$conclusion,"run_url":$run_url,"run_number":$run_number,"run_started_at":$run_started_at}]' \
              "${requirements_tmp}" > "${next_tmp}"
            mv "${next_tmp}" "${requirements_tmp}"
          done

          jq -n \
            --arg generated_utc "${generated_utc}" \
            --arg release_tag "${RELEASE_TAG}" \
            --arg head_sha "${HEAD_SHA}" \
            --arg bundle_pass "${bundle_pass}" \
            --argjson requirements "$(cat "${requirements_tmp}")" \
            '{generated_utc:$generated_utc, release_tag:$release_tag, head_sha:$head_sha, bundle_pass:($bundle_pass == "true"), requirements:$requirements}' \
            > "${summary_json}"

          {
            echo "# RC Validation Bundle"
            echo
            echo "- Release tag: \`${RELEASE_TAG}\`"
            echo "- Head SHA: \`${HEAD_SHA}\`"
            echo "- Generated UTC: \`${generated_utc}\`"
            echo "- Bundle pass: \`${bundle_pass}\`"
            echo
            echo "| Workflow file | Workflow name | Conclusion | Run |"
            echo "|---|---|---|---|"
            jq -r '.requirements[] | "| `\(.workflow)` | \(.run_name) | \(.conclusion) | " + (if .run_url == "" then "_missing_" else "[#\(.run_number)](\(.run_url))" end) + " |"' "${summary_json}"
          } > "${summary_md}"

          echo "bundle_pass=${bundle_pass}" >> "$GITHUB_OUTPUT"

      - name: Publish RC bundle summary
        shell: bash
        run: |
          if [ -f "Artifacts/RCValidation/rc_validation_bundle.md" ]; then
            cat "Artifacts/RCValidation/rc_validation_bundle.md" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload RC validation bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: rc-validation-bundle-${{ needs.preflight.outputs.release_tag }}-${{ github.sha }}
          path: Artifacts/RCValidation/**
          if-no-files-found: error

      - name: Enforce RC validation bundle gate
        shell: bash
        run: |
          if [ "${{ steps.bundle.outputs.bundle_pass }}" != "true" ]; then
            echo "::error::RC validation bundle gate failed. Required workflow evidence is missing or non-successful for HEAD SHA."
            exit 1
          fi

  build_windows_release:
    name: Build Windows release artifact
    needs:
      - preflight
      - secret_scan
      - rc_validation_bundle
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      artifact_name: ${{ steps.artifact_meta.outputs.artifact_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Enforce Addressables delivery policy
        shell: pwsh
        run: |
          ./scripts/ci/addressables-delivery-policy-check.ps1 `
            -PolicyConfigPath "ci/addressables-delivery-policy.json" `
            -ManifestPath "Packages/manifest.json" `
            -LoaderScriptPath "Assets/Scripts/Data/AddressablesPilotCatalogLoader.cs" `
            -SummaryJsonPath "Artifacts/AddressablesPolicy/addressables_delivery_policy_summary.json" `
            -SummaryMarkdownPath "Artifacts/AddressablesPolicy/addressables_delivery_policy_summary.md"

      - name: Run release-context perf evidence gate (strict)
        shell: pwsh
        run: |
          ./scripts/perf-ingest-captured.ps1 `
            -SummaryJsonPath "Artifacts/Perf/perf_ingestion_summary.json" `
            -SummaryMarkdownPath "Artifacts/Perf/perf_ingestion_summary.md" `
            -PerLogOutputDirectory "Artifacts/Perf/Ingested" `
            -FailOnNoLogs

      - name: Run release-context memory gate (strict)
        shell: pwsh
        run: |
          ./scripts/ci/memory-budget-check.ps1 `
            -BaselineConfigPath "ci/memory-budget-baseline.json" `
            -SummaryJsonPath "Artifacts/Memory/memory_budget_summary.json" `
            -SummaryMarkdownPath "Artifacts/Memory/memory_budget_summary.md" `
            -FailOnNoSamples

      - name: Run release-context Addressables duplication gate (strict)
        shell: pwsh
        run: |
          ./scripts/ci/addressables-duplication-check.ps1 `
            -BaselineConfigPath "ci/addressables-duplication-baseline.json" `
            -SummaryJsonPath "Artifacts/Addressables/duplication_summary.json" `
            -SummaryMarkdownPath "Artifacts/Addressables/duplication_summary.md" `
            -FailOnNoReports

      - name: Publish release perf/memory/duplication/policy summaries
        if: always()
        shell: bash
        run: |
          echo "## Release Perf/Memory/Addressables Evidence" >> "$GITHUB_STEP_SUMMARY"
          if [ -f "Artifacts/Perf/perf_ingestion_summary.md" ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            cat "Artifacts/Perf/perf_ingestion_summary.md" >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ -f "Artifacts/Memory/memory_budget_summary.md" ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            cat "Artifacts/Memory/memory_budget_summary.md" >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ -f "Artifacts/Addressables/duplication_summary.md" ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            cat "Artifacts/Addressables/duplication_summary.md" >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ -f "Artifacts/AddressablesPolicy/addressables_delivery_policy_summary.md" ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            cat "Artifacts/AddressablesPolicy/addressables_delivery_policy_summary.md" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload release perf/memory/duplication/policy artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-memory-duplication-policy-release-${{ needs.preflight.outputs.release_tag }}-${{ github.sha }}
          path: |
            Artifacts/Perf/**
            Artifacts/Memory/**
            Artifacts/Addressables/**
            Artifacts/AddressablesPolicy/**
          if-no-files-found: warn

      - name: Validate Unity version contract
        shell: bash
        run: |
          chmod +x scripts/ci/validate-unity-version.sh
          scripts/ci/validate-unity-version.sh

      - name: Validate package lock contract
        shell: bash
        run: |
          chmod +x scripts/ci/validate-package-lock.sh
          scripts/ci/validate-package-lock.sh

      - name: Validate Unity license secret
        shell: bash
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
        run: |
          if [ -z "$UNITY_LICENSE" ]; then
            echo "::error::UNITY_LICENSE secret is required for release build artifact generation."
            exit 1
          fi

          normalized_license="$(printf '%s' "$UNITY_LICENSE" | tr -d '\r\n[:space:]')"
          if [ ${#normalized_license} -lt 40 ]; then
            echo "::error::UNITY_LICENSE appears malformed (payload too short)."
            exit 1
          fi

          if printf '%s' "$UNITY_LICENSE" | grep -Eq '<(License|Unity|root|DeveloperData)'; then
            echo "UNITY_LICENSE payload format: xml-like."
            exit 0
          fi

          if printf '%s' "$normalized_license" | grep -Eq '^[A-Za-z0-9+/=]+$' && [ ${#normalized_license} -ge 120 ]; then
            echo "UNITY_LICENSE payload format: encoded text."
            exit 0
          fi

          echo "::error::UNITY_LICENSE secret does not match expected Unity license payload patterns."
          exit 1

      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-Release-${{ runner.os }}-${{ hashFiles('ProjectSettings/ProjectVersion.txt', 'Packages/manifest.json', 'Packages/packages-lock.json') }}
          restore-keys: |
            Library-Release-${{ runner.os }}-

      - name: Build project (Release profile)
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
        with:
          targetPlatform: StandaloneWindows64
          buildMethod: RavenDevOps.Fishing.EditorTools.BuildCommandLine.BuildWindowsBatchMode
          customParameters: >-
            -buildOutput=Builds/Windows
            -buildExeName=UnityFishingSteamGame.exe
            -buildProfile=Release
            -buildNumber=${{ github.run_number }}
            -buildCommit=${{ github.sha }}
            -buildBranch=${{ github.ref_name }}

      - name: Stage release build artifact
        id: artifact_meta
        shell: bash
        run: |
          if [ ! -d "Builds/Windows" ]; then
            echo "::error::Expected release build output directory missing: Builds/Windows"
            exit 1
          fi

          if [ -z "$(find Builds/Windows -mindepth 1 -maxdepth 1 -print -quit)" ]; then
            echo "::error::Release build output directory is empty: Builds/Windows"
            exit 1
          fi

          mkdir -p Artifacts/ReleaseBuild
          rm -rf Artifacts/ReleaseBuild/Windows
          cp -R Builds/Windows Artifacts/ReleaseBuild/Windows

          artifact_name="windows-release-${{ needs.preflight.outputs.release_tag }}-${{ github.sha }}"
          echo "artifact_name=$artifact_name" >> "$GITHUB_OUTPUT"
          echo "artifact_name=$artifact_name" >> "$GITHUB_STEP_SUMMARY"
          echo "artifact_path=${GITHUB_WORKSPACE}/Artifacts/ReleaseBuild/Windows" >> "$GITHUB_STEP_SUMMARY"

      - name: Generate release SBOM (SPDX JSON)
        uses: anchore/sbom-action@v0
        with:
          path: Artifacts/ReleaseBuild/Windows
          format: spdx-json
          output-file: Artifacts/Provenance/release_windows_sbom.spdx.json

      - name: Verify SBOM output
        shell: bash
        run: |
          sbom_path="Artifacts/Provenance/release_windows_sbom.spdx.json"
          if [ ! -f "$sbom_path" ]; then
            echo "::error::SBOM file missing: $sbom_path"
            exit 1
          fi

          if ! grep -q '"spdxVersion"' "$sbom_path"; then
            echo "::error::SBOM file does not contain expected SPDX metadata."
            exit 1
          fi

          echo "SBOM verified: $sbom_path"

      - name: Generate release build-size report
        shell: bash
        env:
          BUILD_ROOT: Artifacts/ReleaseBuild/Windows
          BASELINE_FILE: ci/build-size-baseline.json
          REPORT_JSON: Artifacts/BuildSize/build_size_report.json
          REPORT_MD: Artifacts/BuildSize/build_size_report.md
          ENFORCEMENT_MODE: fail
          REQUIRE_BASELINE: "true"
          BUILD_SIZE_WARN_DELTA_PERCENT: "8"
          BUILD_SIZE_FAIL_DELTA_PERCENT: "15"
        run: |
          chmod +x scripts/ci/build-size-report.sh
          scripts/ci/build-size-report.sh

      - name: Publish release build-size summary
        shell: bash
        run: |
          if [ -f "Artifacts/BuildSize/build_size_report.md" ]; then
            cat "Artifacts/BuildSize/build_size_report.md" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Release build size report markdown not found." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact_meta.outputs.artifact_name }}
          path: Artifacts/ReleaseBuild/Windows
          if-no-files-found: error

      - name: Upload release build-size artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-size-release-${{ needs.preflight.outputs.release_tag }}-${{ github.sha }}
          path: Artifacts/BuildSize/**
          if-no-files-found: warn

      - name: Upload release provenance artifacts
        uses: actions/upload-artifact@v4
        with:
          name: provenance-release-${{ needs.preflight.outputs.release_tag }}-${{ github.sha }}
          path: Artifacts/Provenance/**
          if-no-files-found: error

      - name: Generate build provenance attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: Artifacts/ReleaseBuild/Windows/**

  steampipe_upload:
    name: SteamPipe upload
    needs:
      - preflight
      - secret_scan
      - build_windows_release
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
    environment:
      name: steam-release
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download release artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build_windows_release.outputs.artifact_name }}
          path: Artifacts/ReleaseBuild

      - name: Validate release artifact handoff
        shell: bash
        run: |
          build_output="${GITHUB_WORKSPACE}/Artifacts/ReleaseBuild/Windows"
          if [ ! -d "$build_output" ]; then
            echo "::error::Expected downloaded release artifact directory missing: $build_output"
            exit 1
          fi

          if [ -z "$(find "$build_output" -mindepth 1 -maxdepth 1 -print -quit)" ]; then
            echo "::error::Downloaded release artifact is empty: $build_output"
            exit 1
          fi

          echo "Validated release artifact path: $build_output"

      - name: Validate required secrets
        shell: bash
        env:
          STEAM_APP_ID: ${{ secrets.STEAM_APP_ID }}
          STEAM_DEPOT_WINDOWS_ID: ${{ secrets.STEAM_DEPOT_WINDOWS_ID }}
          STEAM_USERNAME: ${{ secrets.STEAM_USERNAME }}
          STEAM_CONFIG_VDF: ${{ secrets.STEAM_CONFIG_VDF }}
        run: |
          if [ -z "$STEAM_APP_ID" ] || [ -z "$STEAM_DEPOT_WINDOWS_ID" ] || [ -z "$STEAM_USERNAME" ] || [ -z "$STEAM_CONFIG_VDF" ]; then
            echo "::error::Required Steam release secrets are missing."
            exit 1
          fi

      - name: Release summary
        shell: bash
        run: |
          echo "Release tag: ${{ needs.preflight.outputs.release_tag }}"
          echo "Dry run: ${{ needs.preflight.outputs.dry_run }}"
          echo "Build artifact: ${{ needs.build_windows_release.outputs.artifact_name }}"
          echo "Build output path: ${GITHUB_WORKSPACE}/Artifacts/ReleaseBuild/Windows"

      - name: SteamPipe rehearsal/upload (guarded)
        shell: bash
        env:
          DRY_RUN: ${{ needs.preflight.outputs.dry_run }}
          STEAM_APP_ID: ${{ secrets.STEAM_APP_ID }}
          STEAM_DEPOT_WINDOWS_ID: ${{ secrets.STEAM_DEPOT_WINDOWS_ID }}
          STEAM_USERNAME: ${{ secrets.STEAM_USERNAME }}
          STEAM_CONFIG_VDF: ${{ secrets.STEAM_CONFIG_VDF }}
          STEAM_BUILD_OUTPUT: ${{ github.workspace }}/Artifacts/ReleaseBuild/Windows
          STEAM_BUILD_LOGS: ${{ github.workspace }}/Artifacts/SteamPipeLogs
        run: |
          if [ ! -f "scripts/release/steam_upload.sh" ]; then
            echo "::error::Missing scripts/release/steam_upload.sh upload script."
            exit 1
          fi

          chmod +x scripts/release/steam_upload.sh
          scripts/release/steam_upload.sh "${{ needs.preflight.outputs.release_tag }}"

      - name: Upload SteamPipe logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: steampipe-logs-${{ needs.preflight.outputs.release_tag }}-${{ github.sha }}
          path: Artifacts/SteamPipeLogs/**
          if-no-files-found: warn

